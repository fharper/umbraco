---
name: Update copyright years

on:
  schedule:
    - cron: '0 4 1 1 *'  # Midnight of December 31st (GitHub Action are using UTC)
  workflow_dispatch:

jobs:
  update-license-year:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v6.0.1

      - uses: FantasticFiasco/action-update-license-year@v3.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # if needed them to be signed
          # commitAuthorName: 'Fred'
          # commitAuthorEmail: ${{ secrets.GPG_EMAIL }}
          # gpgPrivateKey: ${{ secrets.GPG_KEY }}
          # gpgPassphrase: ${{ secrets.GPG_PASSPHRASE }}
          # if using commit prefixes
          # commitTitle: "chore: update license years for {{currentYear}}"
          # prTitle: "chore: update license years for {{currentYear}}"
